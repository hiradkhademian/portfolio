<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Manage — Smart AgriTwin</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: linear-gradient(135deg,#eef2f3,#dfe9f3); padding-top:90px; font-family:Inter, sans-serif;}
    .card{border:none;border-radius:12px;box-shadow:0 6px 25px rgba(0,0,0,0.08);}
    .container-narrow{max-width:1100px;margin:auto;}
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
  <div class="container-fluid">
    <a class="navbar-brand" href="/static/dashboard.html">Smart AgriTwin</a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><span id="username-label" class="navbar-text text-white me-3"></span></li>
        <li class="nav-item"><a class="nav-link" href="/static/send_telemetry.html">Send Telemetry</a></li>
        <li class="nav-item"><button class="btn btn-outline-light btn-sm" onclick="logout()">Logout</button></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container-narrow">
  <div class="card p-4">
    <h3>Manage Entities</h3>
    <p class="small-muted">Create and manage farms, zones, and devices via UI.</p>

    <ul class="nav nav-tabs" id="manageTabs" role="tablist">
      <li class="nav-item"><button class="nav-link active" id="farms-tab" data-bs-toggle="tab" data-bs-target="#farms-pane">Farms</button></li>
      <li class="nav-item"><button class="nav-link" id="zones-tab" data-bs-toggle="tab" data-bs-target="#zones-pane">Zones</button></li>
      <li class="nav-item"><button class="nav-link" id="devices-tab" data-bs-toggle="tab" data-bs-target="#devices-pane">Devices</button></li>
    </ul>

    <div class="tab-content mt-3">
      <!-- FARMS -->
      <div class="tab-pane fade show active" id="farms-pane">
        <div class="d-flex justify-content-between mb-2">
          <h5>Farms</h5>
          <div>
            <input id="newFarmName" class="form-control d-inline-block" style="width:240px" placeholder="New farm name">
            <button class="btn btn-primary ms-2" onclick="createFarm()">Add Farm</button>
          </div>
        </div>
        <div id="farmsList" class="list-group"></div>
      </div>

      <!-- ZONES -->
      <div class="tab-pane fade" id="zones-pane">
        <div class="d-flex justify-content-between mb-2">
          <h5>Zones</h5>
          <div>
            <select id="zoneFarmSelect" class="form-select d-inline-block" style="width:220px"></select>
            <input id="newZoneName" class="form-control d-inline-block" style="width:220px" placeholder="New zone name">
            <button class="btn btn-primary ms-2" onclick="createZone()">Add Zone</button>
          </div>
        </div>
        <div id="zonesList" class="list-group"></div>
      </div>

      <!-- DEVICES -->
      <div class="tab-pane fade" id="devices-pane">
        <div class="d-flex justify-content-between mb-2">
          <h5>Devices</h5>
          <div>
            <input id="newDeviceUid" class="form-control d-inline-block" style="width:220px" placeholder="device uid">
            <select id="deviceZoneSelect" class="form-select d-inline-block" style="width:220px"></select>
            <button class="btn btn-primary ms-2" onclick="createDevice()">Add Device</button>
          </div>
        </div>
        <div id="devicesList" class="list-group"></div>
      </div>
    </div>
  </div>
</div>

<script>
const token = localStorage.getItem('token');
if(!token) location.href='/static/login.html';
document.getElementById('username-label').innerText = localStorage.getItem('username') || '';

function logout(){ localStorage.removeItem('token'); localStorage.removeItem('username'); location.href='/static/login.html'; }

// FARMS
async function loadFarms(){
  const res = await fetch('/api/farms/',{ headers:{ 'Authorization':'Bearer '+token }});
  const farms = await res.json();
  const node = document.getElementById('farmsList');
  node.innerHTML='';
  const farmSelect = document.getElementById('zoneFarmSelect');
  farmSelect.innerHTML='';
  farms.forEach(f=>{
    node.innerHTML += `<div class="list-group-item d-flex justify-content-between align-items-center">
      <div>
        <strong>${f.name}</strong><div class="small-muted">id: ${f.id}</div>
      </div>
      <div>
        <button class="btn btn-sm btn-outline-secondary me-2" onclick="editFarm(${f.id},'${f.name.replace(/'/g,"\\'")}')">Edit</button>
        <button class="btn btn-sm btn-danger" onclick="deleteFarm(${f.id})">Delete</button>
      </div>
    </div>`;
    farmSelect.innerHTML += `<option value="${f.id}">${f.name}</option>`;
  });
}

async function createFarm(){
  const name = document.getElementById('newFarmName').value.trim();
  if(!name) return alert('Enter name');
  await fetch('/api/farms/', { method:'POST', headers:{ 'Content-Type':'application/json','Authorization':'Bearer '+token }, body: JSON.stringify({ name })});
  document.getElementById('newFarmName').value='';
  await loadFarms(); loadZones();
}

async function editFarm(id, oldName){
  const name = prompt('Edit farm name', oldName);
  if(!name) return;
  await fetch(`/api/farms/${id}`, { method:'PATCH', headers:{ 'Content-Type':'application/json','Authorization':'Bearer '+token }, body: JSON.stringify({ name })});
  await loadFarms();
}

async function deleteFarm(id){
  if(!confirm('Delete farm?')) return;
  await fetch(`/api/farms/${id}`,{ method:'DELETE', headers:{ Authorization:'Bearer '+token }});
  await loadFarms(); loadZones();
}

// ZONES
async function loadZones(){
  const farmId = document.getElementById('zoneFarmSelect').value;
  // show all zones for selected farm
  const res = await fetch(`/api/zones/?farm_id=${farmId || ''}`,{ headers:{ Authorization:'Bearer '+token }});
  const zones = await res.json();
  const node = document.getElementById('zonesList');
  node.innerHTML='';
  const deviceZoneSelect = document.getElementById('deviceZoneSelect');
  deviceZoneSelect && (deviceZoneSelect.innerHTML='');
  zones.forEach(z=>{
    node.innerHTML += `<div class="list-group-item d-flex justify-content-between align-items-center">
      <div>
        <strong>${z.name}</strong><div class="small-muted">id: ${z.id} • farm: ${z.farm_id}</div>
      </div>
      <div>
        <button class="btn btn-sm btn-outline-secondary me-2" onclick="editZone(${z.id},'${z.name.replace(/'/g,"\\'")}')">Edit</button>
        <button class="btn btn-sm btn-danger" onclick="deleteZone(${z.id})">Delete</button>
      </div>
    </div>`;
    deviceZoneSelect && (deviceZoneSelect.innerHTML += `<option value="${z.id}">${z.name} (F${z.farm_id})</option>`);
  });
}

async function createZone(){
  const name = document.getElementById('newZoneName').value.trim();
  const farm_id = document.getElementById('zoneFarmSelect').value;
  if(!name || !farm_id) return alert('Select farm & enter name');
  await fetch('/api/zones/',{ method:'POST', headers:{ 'Content-Type':'application/json','Authorization':'Bearer '+token }, body: JSON.stringify({ name, farm_id: Number(farm_id) })});
  document.getElementById('newZoneName').value='';
  await loadZones(); loadDevices();
}

async function editZone(id, oldName){
  const name = prompt('Edit zone name', oldName);
  if(!name) return;
  await fetch(`/api/zones/${id}`,{ method:'PATCH', headers:{ 'Content-Type':'application/json','Authorization':'Bearer '+token }, body: JSON.stringify({ name })});
  await loadZones();
}

async function deleteZone(id){
  if(!confirm('Delete zone?')) return;
  await fetch(`/api/zones/${id}`,{ method:'DELETE', headers:{ Authorization:'Bearer '+token }});
  await loadZones(); loadDevices();
}

// DEVICES
async function loadDevices(){
  const res = await fetch(`/api/devices/`,{ headers:{ Authorization:'Bearer '+token }});
  const devices = await res.json();
  const node = document.getElementById('devicesList');
  node.innerHTML='';
  const sel = document.getElementById('deviceZoneSelect');
  sel.innerHTML = '';
  devices.forEach(d=>{
    node.innerHTML += `<div class="list-group-item d-flex justify-content-between align-items-center">
      <div><strong>${d.device_uid}</strong><div class="small-muted">id:${d.id} • zone:${d.zone_id}</div></div>
      <div>
        <button class="btn btn-sm btn-outline-secondary me-2" onclick="viewZone(${d.zone_id})">View</button>
        <button class="btn btn-sm btn-danger" onclick="deleteDevice(${d.id})">Delete</button>
      </div>
    </div>`;
    sel.innerHTML += `<option value="${d.zone_id}">${d.zone_id} (Zone)</option>`;
  });
}

function viewZone(id){ window.location.href = `/static/zone_detail.html?zone_id=${id}`; }

async function createDevice(){
  const device_uid = document.getElementById('newDeviceUid').value.trim();
  const zone_id = document.getElementById('deviceZoneSelect').value;
  if(!device_uid || !zone_id) return alert('Enter UID and select zone');
  await fetch('/api/devices/',{ method:'POST', headers:{ 'Content-Type':'application/json','Authorization':'Bearer '+token }, body: JSON.stringify({ device_uid, zone_id: Number(zone_id) })});
  document.getElementById('newDeviceUid').value='';
  await loadDevices();
}

async function deleteDevice(id){
  if(!confirm('Delete device?')) return;
  await fetch(`/api/devices/${id}`,{ method:'DELETE', headers:{ Authorization:'Bearer '+token }});
  await loadDevices();
}

// initial loads
loadFarms();
loadZones();
loadDevices();

// update zones list when farm selector changes
document.getElementById('zoneFarmSelect').addEventListener('change', loadZones);
</script>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/assets/js/global-alerts.js"></script>

</body>
</html>
