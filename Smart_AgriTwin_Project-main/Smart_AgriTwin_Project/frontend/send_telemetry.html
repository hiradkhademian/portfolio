<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Send Telemetry — Smart AgriTwin</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: linear-gradient(135deg,#eef2f3,#dfe9f3); padding-top:90px; font-family:Inter, sans-serif; }
    .card { border:none; border-radius:12px; box-shadow:0 6px 25px rgba(0,0,0,0.08); }
    .container-narrow { max-width:1000px; margin:auto; }
    .nav-link { color:#fff !important; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top shadow">
  <div class="container-fluid">
    <a class="navbar-brand" href="/static/dashboard.html">🌱 Smart AgriTwin</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navMain">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item"><a class="nav-link" href="/static/dashboard.html">🏡 Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" href="/static/devices.html">🔌 Devices</a></li>
        <li class="nav-item"><a class="nav-link active" href="/static/send_telemetry.html">📡 Send Telemetry</a></li>
        <li class="nav-item"><a class="nav-link" href="/static/commands.html">🖥️ Commands</a></li>
        <li class="nav-item"><a class="nav-link" href="/static/rules.html">⚙️ Rules</a></li>
        <li class="nav-item"><a class="nav-link" href="/static/alerts.html">🚨 Alerts</a></li>
      </ul>

      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><span id="username-label" class="navbar-text text-white me-3"></span></li>
        <li class="nav-item"><button class="btn btn-outline-light btn-sm" id="logoutBtn">Logout</button></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container-narrow">
  <div class="card p-4 mb-4 mt-3">
    <h3 class="mb-3">Manual Telemetry Sender</h3>
    <p class="text-muted">Send telemetry for a device manually. This triggers the same rule engine and updates charts.</p>

    <div class="row g-3 mb-2">
      <div class="col-md-6">
        <label class="form-label">Device UID</label>
        <select id="deviceUid" class="form-select"></select>
      </div>

      <div class="col-md-2">
        <label class="form-label">Temperature (°C)</label>
        <input id="temperature" type="number" class="form-control" step="0.1" value="25">
      </div>

      <div class="col-md-2">
        <label class="form-label">Humidity (%)</label>
        <input id="humidity" type="number" class="form-control" step="0.1" value="50">
      </div>

      <div class="col-md-2">
        <label class="form-label">Soil Moisture (%)</label>
        <input id="soil" type="number" class="form-control" step="0.1" value="30">
      </div>
    </div>

    <div class="d-flex justify-content-end mb-3">
      <button id="sendBtn" class="btn btn-primary">Send Telemetry</button>
    </div>

    <hr>
    <h6>Quick-send templates</h6>
    <div class="d-flex gap-2 mb-3">
      <button class="btn btn-outline-secondary" onclick="quickSend(30,60,40)">High Temp</button>
      <button class="btn btn-outline-secondary" onclick="quickSend(18,50,35)">Low Temp</button>
      <button class="btn btn-outline-secondary" onclick="quickSend(25,80,45)">Humid Spike</button>
    </div>

    <div id="sendResult" class="mt-2"></div>
  </div>
</div>

<script>
const token = localStorage.getItem('token');
const username = localStorage.getItem('username') || '';
if (!token) location.href = '/static/login.html';
document.getElementById('username-label').innerText = username ? 'Logged in as: '+username : '';
document.getElementById('logoutBtn').addEventListener('click', logout);

function logout(){ localStorage.removeItem('token'); localStorage.removeItem('username'); location.href='/static/login.html'; }

async function loadDevices() {
  try {
    const res = await fetch('/api/devices/', { headers: { 'Authorization': 'Bearer ' + token }});
    if (res.status === 401) return logout();
    if (!res.ok) return;
    const devices = await res.json();
    const sel = document.getElementById('deviceUid');
    sel.innerHTML = '';
    devices.forEach(d => sel.innerHTML += `<option value="${d.device_uid}">${d.device_uid} — zone ${d.zone_id}</option>`);
  } catch(e) {
    console.error(e);
  }
}
loadDevices();

async function sendTelemetry(device_uid, temp, hum, soil) {
  const payload = { device_uid, payload: { temperature: Number(temp), humidity: Number(hum), soil_moisture: Number(soil) } };
  const res = await fetch('/api/telemetry/ingest', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
    body: JSON.stringify(payload)
  });
  if (res.status === 401) return logout();
  const text = await res.text();
  document.getElementById('sendResult').innerText = `Status: ${res.status} — ${text}`;
  return res.ok;
}

document.getElementById('sendBtn').addEventListener('click', async () => {
  const device_uid = document.getElementById('deviceUid').value;
  const temp = document.getElementById('temperature').value;
  const hum = document.getElementById('humidity').value;
  const soil = document.getElementById('soil').value;
  document.getElementById('sendBtn').disabled = true;
  await sendTelemetry(device_uid, temp, hum, soil);
  document.getElementById('sendBtn').disabled = false;
});

function quickSend(t,h,s){ const device_uid = document.getElementById('deviceUid').value; sendTelemetry(device_uid, t, h, s); }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
