<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Devices — Smart AgriTwin</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background:#f4f6f9; padding-top:90px; font-family:Inter, sans-serif; }
    .device-card { border-radius:12px; background:#fff; padding:18px; box-shadow:0 3px 12px rgba(0,0,0,0.06); }
    .nav-link { color:#fff !important; }
    .container-narrow { max-width:1100px; margin:auto; }
  </style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top shadow">
  <div class="container-fluid">
    <a class="navbar-brand" href="/static/dashboard.html">Smart AgriTwin</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navMain">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link" href="/static/dashboard.html">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link active" href="/static/devices.html">Devices</a></li>
        <li class="nav-item"><a class="nav-link" href="/static/commands.html">Commands</a></li>
        <li class="nav-item"><a class="nav-link" href="/static/rules.html">Rules</a></li>
        <li class="nav-item"><a class="nav-link" href="/static/alerts.html">Alerts</a></li>
      </ul>

      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><span id="username-label" class="navbar-text text-white"></span></li>
        <li class="nav-item"><button onclick="logout()" class="btn btn-outline-light btn-sm">Logout</button></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container-narrow mt-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h3>Your Devices</h3>
    <button class="btn btn-primary" onclick="openAddModal()">+ Add Device</button>
  </div>
  <div id="devices" class="row g-3"></div>
</div>

<!-- Modal for adding device -->
<div class="modal fade" id="addDeviceModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Register Device</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">

        <label>Device UID</label>
        <input id="deviceUid" class="form-control mb-3" placeholder="DEV-001">

        <label>Device Type</label>
        <select id="deviceType" class="form-select mb-3">
          <option value="temp-hum-soil">Temperature + Humidity + Soil Moisture</option>
          <option value="temp-only">Temperature Only</option>
        </select>

        <label>Zone</label>
<input id="zoneId" class="form-control" disabled>

      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-success" id="saveDeviceBtn">Save Device</button>
      </div>

    </div>
  </div>
</div>

<script>

const zoneFromUrl = new URLSearchParams(window.location.search).get("zone_id");
  if (zoneFromUrl) {
  document.getElementById("zoneId").value = zoneFromUrl;
}
const token = localStorage.getItem("token");
const username = localStorage.getItem("username");
if (!token) location.href = "/static/login.html";

document.getElementById("username-label").innerText =
  username ? "Logged in as: " + username : "";

// URL'den farm_id'yi al (varsa)
const farmId = new URLSearchParams(window.location.search).get("farm_id");

function logout() {
  localStorage.removeItem("token");
  localStorage.removeItem("username");
  location.href = "/static/login.html";
}

function viewZone(id) {
  location.href = `/static/zone_detail.html?zone_id=${id}`;
}

function openAddModal() {
  new bootstrap.Modal(document.getElementById("addDeviceModal")).show();
}

async function loadDevices() {
  const res = await fetch("/api/devices/", {
    headers: { Authorization: "Bearer " + token }
  });

  const allDevices = await res.json();
  let devices = allDevices;

  // 🔹 FILTER BY ZONE
  if (zoneFromUrl) {
    devices = allDevices.filter(d => d.zone_id == Number(zoneFromUrl));
  }

  let out = "";
  devices.forEach(d => {
    out += `
      <div class="col-md-4">
        <div class="device-card">
          <h5>${d.device_uid}</h5>
          <div>Zone: ${d.zone_id}</div>

          <div class="mt-3 d-flex gap-2">
            <button class="btn btn-sm btn-primary" onclick="viewZone(${d.zone_id})">
              Telemetry
            </button>

            <button class="btn btn-sm btn-danger" onclick="deleteDevice(${d.id})">
              Delete
            </button>
          </div>
        </div>
      </div>`;
  });

  document.getElementById("devices").innerHTML = out;
}


async function deleteDevice(id) {
  if (!confirm("Are you sure you want to delete this device?")) return;

  const res = await fetch(`/api/devices/${id}`, {
    method: "DELETE",
    headers: { Authorization: "Bearer " + token }
  });

  if (!res.ok) {
    alert("Delete failed: " + await res.text());
    return;
  }

  alert("Device deleted.");
  loadDevices();
}

document.getElementById("saveDeviceBtn").addEventListener("click", async () => {
  const uid = document.getElementById("deviceUid").value.trim();
  const type = document.getElementById("deviceType").value;

  if (!zoneFromUrl) {
    return alert("Devices must be created from a zone page.");
  }

  const zoneId = Number(zoneFromUrl);

  if (!uid) return alert("Device UID is required");

  const res = await fetch("/api/devices/", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      Authorization: "Bearer " + token
    },
    body: JSON.stringify({ device_uid: uid, type, zone_id: zoneId })
  });

  if (!res.ok) return alert("Error: " + await res.text());

  alert("Device registered");
  loadDevices();
  bootstrap.Modal.getInstance(document.getElementById("addDeviceModal")).hide();
});

loadDevices();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/assets/js/global-alerts.js"></script>


</body>
</html>
