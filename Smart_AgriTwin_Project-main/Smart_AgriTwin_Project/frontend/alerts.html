<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Alert Center — Smart AgriTwin</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body { background:#f4f6f9; padding-top:90px; font-family:Inter, sans-serif; }
    .alert-card { border-left:5px solid #ccc; border-radius:8px; padding:14px; background:#fff; box-shadow:0 3px 12px rgba(0,0,0,0.05); margin-bottom:12px; }
    .critical { border-color:#dc3545 !important; }
    .warning { border-color:#ffc107 !important; }
    .info { border-color:#0d6efd !important; }
    .nav-link { color:#fff !important; }
    .container-narrow{ max-width:1100px; margin:auto; }
  </style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top shadow">
  <div class="container-fluid">
    <a class="navbar-brand" href="/static/dashboard.html">🌱 Smart AgriTwin</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navAlerts">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navAlerts">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item"><a class="nav-link" href="/static/dashboard.html">🏡 Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" href="/static/devices.html">🔌 Devices</a></li>
        <!-- REMOVED Send Telemetry -->
        <li class="nav-item"><a class="nav-link" href="/static/commands.html">🖥️ Commands</a></li>
        <li class="nav-item"><a class="nav-link" href="/static/rules.html">⚙️ Rules</a></li>
        <li class="nav-item"><a class="nav-link active" href="/static/alerts.html">🚨 Alerts</a></li>
      </ul>

      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><span id="username-label" class="navbar-text text-white me-3"></span></li>
        <li class="nav-item"><button class="btn btn-outline-light btn-sm" id="logoutAlerts">Logout</button></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container-narrow mt-4">
  <h2>Alert Center</h2>
  <p class="text-muted">View and manage alerts generated by your rule engine.</p>

  <!-- Filters -->
  <div class="row g-3 mb-3">
    <div class="col-md-3"><label>Farm</label><select id="farmFilter" class="form-select"></select></div>
    <div class="col-md-3"><label>Zone</label><select id="zoneFilter" class="form-select"></select></div>
    <div class="col-md-3"><label>Severity</label>
      <select id="severityFilter" class="form-select">
        <option value="">All</option>
        <option value="critical">Critical</option>
        <option value="warning">Warning</option>
        <option value="info">Info</option>
      </select>
    </div>
    <div class="col-md-3"><label>Status</label>
      <select id="statusFilter" class="form-select">
        <option value="">All</option>
        <option value="unread">Unread Only</option>
      </select>
    </div>
  </div>

  <div id="alertList"></div>
</div>


<script>
/* ===========================
   AUTH & USER
=========================== */
const token = localStorage.getItem('token');
const username = localStorage.getItem('username') || '';

if (!token) location.href = '/static/login.html';
document.getElementById('username-label').innerText = username;

/* ===========================
   DOM REFERENCES (IMPORTANT)
=========================== */
const farmFilter = document.getElementById('farmFilter');
const zoneFilter = document.getElementById('zoneFilter');
const severityFilter = document.getElementById('severityFilter');
const statusFilter = document.getElementById('statusFilter');

/* ===========================
   NOTIFICATION STATE
=========================== */
let lastSeenTimestamp = null;

// Ask notification permission once
if ("Notification" in window && Notification.permission === "default") {
  Notification.requestPermission();
}

/* ===========================
   LOGOUT
=========================== */
document.getElementById('logoutAlerts').addEventListener('click', () => {
  localStorage.removeItem('token');
  localStorage.removeItem('username');
  location.href = '/static/login.html';
});


/* ===========================
   LOAD FARMS
=========================== */
async function loadFarms() {
  const res = await fetch('/api/farms/', {
    headers: { Authorization: 'Bearer ' + token }
  });
  const farms = await res.json();

  farmFilter.innerHTML = '<option value="">All Farms</option>';
  farms.forEach(f =>
    farmFilter.innerHTML += `<option value="${f.id}">${f.name}</option>`
  );

  loadZones();
}


/* ===========================
   LOAD ZONES
=========================== */
async function loadZones() {
  const farmId = farmFilter.value;

  if (!farmId) {
    zoneFilter.innerHTML = '<option value="">All Zones</option>';
    return;
  }

  const res = await fetch(`/api/zones/?farm_id=${farmId}`, {
    headers: { Authorization: 'Bearer ' + token }
  });

  const zones = await res.json();
  zoneFilter.innerHTML = '<option value="">All Zones</option>';
  zones.forEach(z =>
    zoneFilter.innerHTML += `<option value="${z.id}">${z.name}</option>`
  );
}


/* ===========================
   MARK ALERT AS READ
=========================== */
async function markAsRead(id) {
  const res = await fetch(`/api/alerts/${id}`, {
    method: "PATCH",
    headers: {
      "Authorization": "Bearer " + token,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ read: true })
  });

  if (res.ok) loadAlerts();
}


/* ===========================
   LOAD ALERTS
=========================== */
async function loadAlerts() {
  const p = new URLSearchParams();

  if (farmFilter.value) p.set('farm_id', farmFilter.value);
  if (zoneFilter.value) p.set('zone_id', zoneFilter.value);
  if (severityFilter.value) p.set('severity', severityFilter.value);
  if (statusFilter.value === 'unread') p.set('unread', '1');

  const res = await fetch(`/api/alerts/?${p.toString()}`, {
    headers: { Authorization: 'Bearer ' + token }
  });

  const alerts = await res.json();
  renderAlerts(alerts);
}


/* ===========================
   RENDER ALERTS + REALTIME POPUPS
=========================== */
function renderAlerts(alerts) {
  const container = document.getElementById('alertList');
  container.innerHTML = '';

  if (!alerts || alerts.length === 0) {
    container.innerHTML = '<p>No alerts found.</p>';
    return;
  }

  alerts.forEach(a => {
    const id = a.id;
    const severity = a.severity?.toLowerCase() || "info";
    const read = a.read;
    const msg = a.message || "Alert";
    const ts = a.timestamp ? new Date(a.timestamp) : null;
    const time = ts ? ts.toLocaleString() : '';
    const device = a.device_id ?? "-";
    const zone = a.zone_id ?? "-";

    /* 🔔 REAL-TIME NOTIFICATION (timestamp-based) */
    if (!read && ts) {
      if (!lastSeenTimestamp || ts > lastSeenTimestamp) {
        if (Notification.permission === "granted") {
          new Notification(`${severity.toUpperCase()} Alert`, {
            body: msg
          });
        }
        lastSeenTimestamp = ts;
      }
    }

    const card = document.createElement('div');
    card.className = `alert-card ${severity}`;
    card.innerHTML = `
      <div class="d-flex justify-content-between">
        <div>
          <h6 class="mb-1">${severity.toUpperCase()}</h6>
          <div>${msg}</div>
          <small class="text-muted">
            Device: ${device} • Zone: ${zone} • ${time}
          </small>
        </div>
        <div class="text-end">
          ${
            read
              ? `<span class="badge bg-success">Read</span>`
              : `<button class="btn btn-sm btn-success" onclick="markAsRead(${id})">Mark as Read</button>`
          }
        </div>
      </div>
    `;
    container.appendChild(card);
  });
}


/* ===========================
   FILTER EVENTS
=========================== */
farmFilter.addEventListener('change', () => { loadZones(); loadAlerts(); });
zoneFilter.addEventListener('change', loadAlerts);
severityFilter.addEventListener('change', loadAlerts);
statusFilter.addEventListener('change', loadAlerts);


/* ===========================
   INIT
=========================== */
loadFarms();
loadAlerts();
setInterval(loadAlerts, 3000); // polling

</script>




<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
