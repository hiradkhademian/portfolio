<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Konum Takip</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; width: 100vw; height: 100vh; overflow: hidden; }
    #map { width: 100vw; height: 100vh; }
    #profile-card {
      position: absolute; top: 16px; left: 16px; z-index: 1000;
      background: rgba(255,255,255,0.96); border-radius: 12px;
      padding: 16px 20px; min-width: 220px; max-width: 280px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.18); border-left: 4px solid #e53e3e;
    }
    #profile-card h2 {
      font-size: 16px; font-weight: 700; color: #1a1a1a;
      margin-bottom: 12px; display: flex; align-items: center; gap: 8px;
    }
    .live-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: #e53e3e; flex-shrink: 0; animation: pulse 1.5s infinite;
    }
    .profile-row {
      display: flex; justify-content: space-between;
      font-size: 13px; padding: 5px 0;
      border-bottom: 1px solid #f0f0f0;
    }
    .profile-row:last-child { border-bottom: none; }
    .profile-label { color: #888; font-weight: 500; }
    .profile-value { font-weight: 600; color: #1a1a1a; text-align: right; }
    #status-bar {
      position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
      z-index: 1000; background: rgba(0,0,0,0.72); color: #fff;
      padding: 8px 20px; border-radius: 20px; font-size: 13px;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(1.3); }
    }
  </style>
</head>
<body>
<div id="map"></div>
<div id="profile-card">
  <h2><div class="live-dot"></div><span id="full-name">—</span></h2>
  <div id="profile-rows"></div>
</div>
<div id="status-bar">Demo modu</div>
<script>
  // Get emergency ID from URL parameters
  const urlParams = new URLSearchParams(window.location.search);
  const EMERGENCY_ID = urlParams.get('emergency_id');
  const API_BASE = '/api';
  const POLL_MS = 3000;

  // Fallback demo data
  const DEMO_EMERGENCY = {
    emergency: {
      id: 1,
      latitude: 39.9208,
      longitude: 32.8541,
      status: 'active',
      timestamp: new Date().toISOString()
    },
    user: {
      id: 1,
      full_name: 'Demo User',
      email: 'demo@example.com',
      blood_type: 'A+',
      diseases: 'None'
    }
  };

  const map = L.map('map', { zoomControl: false });
  L.control.zoom({ position: 'topright' }).addTo(map);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors', maxZoom: 19
  }).addTo(map);

  const redIcon = L.divIcon({
    className: '',
    html: '<div style="width:18px;height:18px;background:#e53e3e;border:3px solid #fff;border-radius:50%;box-shadow:0 2px 6px rgba(0,0,0,0.4);"></div>',
    iconSize: [18, 18], iconAnchor: [9, 9]
  });

  let marker = null;

  async function loadEmergencyData() {
    let data;
    try {
      if (EMERGENCY_ID) {
        const res = await fetch(`${API_BASE}/emergency/${EMERGENCY_ID}`);
        if (!res.ok) throw new Error();
        data = await res.json();
        if (!data.success) throw new Error();
        data = data;
      } else {
        throw new Error('No emergency ID');
      }
    } catch {
      data = DEMO_EMERGENCY;
      document.getElementById('status-bar').textContent = 'Demo modu - Emergency ID gerekli';
    }

    // Update profile card
    const user = data.user;
    document.getElementById('full-name').textContent = user.full_name;
    document.getElementById('profile-rows').innerHTML = [
      { label: 'Email', value: user.email || '—' },
      { label: 'Kan Grubu', value: user.blood_type || '—' },
      { label: 'Hastalıklar', value: user.diseases || 'Yok' },
      { label: 'Durum', value: data.emergency.status || '—' }
    ].map(function(f) {
      return '<div class="profile-row"><span class="profile-label">' + f.label + '</span><span class="profile-value">' + f.value + '</span></div>';
    }).join('');

    // Update map
    const emergency = data.emergency;
    const latlng = [emergency.latitude, emergency.longitude];

    if (!marker) {
      marker = L.marker(latlng, { icon: redIcon }).addTo(map);
      map.setView(latlng, 15);
    } else {
      marker.setLatLng(latlng);
      map.panTo(latlng, { animate: true });
    }

    // Update status bar
    if (EMERGENCY_ID) {
      const timestamp = new Date(emergency.timestamp);
      document.getElementById('status-bar').textContent = 'Acil Durum · ' + timestamp.toLocaleTimeString('tr-TR');
    }
  }

  // Load data immediately and then every 3 seconds
  loadEmergencyData();
  setInterval(loadEmergencyData, POLL_MS);
</script>
</body>
</html>
