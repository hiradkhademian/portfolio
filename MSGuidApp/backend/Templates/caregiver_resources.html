<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Caregiver Resources</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
            margin: 0;
            padding: 0;
            text-align: center;
        }
        header {
            background-color: #2e86c1;
            padding: 20px;
            color: white;
            font-size: 24px;
        }
        .content {
            max-width: 600px;
            margin: 20px auto;
            padding: 20px;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        label {
            display: block;
            font-size: 16px;
            margin-top: 10px;
            color: #145a8d;
            font-weight: bold;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 16px;
        }
        button {
            background-color: #2e86c1;
            color: white;
            padding: 10px 15px;
            border-radius: 5px;
            font-size: 18px;
            border: none;
            cursor: pointer;
            margin-top: 15px;
        }
        button:hover {
            background-color: #145a8d;
        }
    </style>
</head>
<body>

<header>
    <h1>Family & Caregiver Resources</h1>
</header>

<section class="content">
    <h2>Submit a Caregiver Inquiry</h2>
    <p>Need legal, financial, or emotional support? Submit your inquiry below.</p>

    <form action="{{ url_for('caregiver_resources') }}" method="POST">
        <label for="name">Your Name:</label>
        <input type="text" id="name" name="name" required>

        <label for="email">Your Email:</label>
        <input type="email" id="email" name="email" required>

        <label for="inquiry">Your Inquiry:</label>
        <textarea id="inquiry" name="inquiry" rows="5" required></textarea>

        <button type="submit">Submit Inquiry</button>
    </form>
</section>

<a href="{{ url_for('index') }}" style="display: block; margin: 20px auto;">Back to Home</a>

</body>
</html>
